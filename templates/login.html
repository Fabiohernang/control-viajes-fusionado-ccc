<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingresar</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body class="portal-body">
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card app-card shadow-sm" style="max-width: 430px; width: 100%;">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <img
            src="{{ url_for('static', filename='logo-cooperativa.PNG') }}"
            alt="Logo"
            style="width: 72px; height: 72px; object-fit: contain;"
            onerror="this.style.display='none';"
          >
          <h1 class="h4 mt-3 mb-1">Ingreso al sistema</h1>
          <div class="text-secondary">Cooperativa de Transporte</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'success' if category == 'success' else 'warning' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" required autocomplete="username">
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" required autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Ingresar
          </button>
        </form>

        <div class="mt-4 small text-secondary text-center">
          Acceso restringido solo para usuarios autorizados
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
