{% extends "base.html" %}
{% block title %}Registrar pago liquidación{% endblock %}

{% block content %}
<div class="hero-panel mb-4">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
    <div>
      <h1 class="page-title mb-1">Registrar pago de liquidación</h1>
      <div class="text-secondary">{{ liquidacion.fletero }} · saldo pendiente {{ liquidacion.saldo_pendiente|ars }}</div>
    </div>
    <div>
      <a href="{{ url_for('detalle_liquidacion', liquidacion_id=liquidacion.id) }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Volver
      </a>
    </div>
  </div>
</div>

<form method="post" class="row g-4">
  <div class="col-12">
    <div class="card shadow-sm app-card">
      <div class="card-body p-4">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Fecha</label>
            <input type="date" name="fecha" class="form-control" value="{{ fecha_hoy }}" required>
          </div>

          <div class="col-md-3">
            <label class="form-label">Medio</label>
            <select name="medio" class="form-select" required>
              <option value="">Seleccionar...</option>
              <option value="Cheque">Cheque</option>
              <option value="Echeq">Echeq</option>
              <option value="Transferencia">Transferencia</option>
              <option value="Efectivo">Efectivo</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">N° / referencia</label>
            <input type="text" name="numero" class="form-control" placeholder="N° cheque / echeq / transferencia">
          </div>

          <div class="col-md-3">
            <label class="form-label">Importe</label>
            <input type="number" step="0.01" min="0" name="importe" class="form-control" required>
          </div>

          <div class="col-12">
            <label class="form-label">Observaciones</label>
            <textarea name="observaciones" class="form-control" rows="3" placeholder="Opcional"></textarea>
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-primary" type="submit">
            <i class="bi bi-save me-1"></i> Guardar pago
          </button>
          <a class="btn btn-outline-secondary" href="{{ url_for('detalle_liquidacion', liquidacion_id=liquidacion.id) }}">Cancelar</a>
        </div>
      </div>
    </div>
  </div>
</form>
{% endblock %}
