{% extends "base.html" %}
{% block title %}Cambiar contraseña{% endblock %}

{% block content %}
<div class="hero-panel mb-4">
  <h1 class="page-title mb-1">Cambiar contraseña</h1>
  <div class="text-secondary">Actualizá tu contraseña de acceso al sistema.</div>
</div>

<div class="card app-card shadow-sm">
  <div class="card-body p-4">
    <form method="post" class="row g-3">
      <div class="col-12">
        <label class="form-label">Contraseña actual</label>
        <input type="password" name="current_password" class="form-control" required autocomplete="current-password">
      </div>

      <div class="col-md-6">
        <label class="form-label">Nueva contraseña</label>
        <input type="password" name="new_password" class="form-control" required minlength="8" autocomplete="new-password">
      </div>

      <div class="col-md-6">
        <label class="form-label">Confirmar nueva contraseña</label>
        <input type="password" name="confirm_password" class="form-control" required minlength="8" autocomplete="new-password">
      </div>

      <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-shield-lock me-1"></i> Guardar contraseña
        </button>
        <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
