{% extends "base.html" %}
{% block title %}Configuración{% endblock %}

{% block content %}
<div class="mb-4">
  <h1 class="h3 mb-1">Configuración</h1>
  <p class="text-secondary mb-0">Acá definís los porcentajes. Nada de andar buscando fórmulas escondidas en una celda perdida.</p>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" class="row g-3">
      <div class="col-md-3">
        <label class="form-label">IVA</label>
        <input class="form-control" type="number" step="0.0001" name="iva_rate" value="{{ config.iva_rate }}">
        <div class="form-text">Ej: 0.21 = 21%</div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Comisión socio</label>
        <input class="form-control" type="number" step="0.0001" name="socio_commission_rate" value="{{ config.socio_commission_rate }}">
        <div class="form-text">Ej: 0.06 = 6%</div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Comisión no socio</label>
        <input class="form-control" type="number" step="0.0001" name="no_socio_commission_rate" value="{{ config.no_socio_commission_rate }}">
        <div class="form-text">Ej: 0.10 = 10%</div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Comisión Lucas</label>
        <input class="form-control" type="number" step="0.0001" name="lucas_commission_rate" value="{{ config.lucas_commission_rate }}">
        <div class="form-text">Ej: 0.015 = 1.5%</div>
      </div>

      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary" type="submit">Guardar configuración</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Volver</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
