services:
  - type: web
    name: control-viajes-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: control-viajes-db
          property: connectionString

databases:
  - name: control-viajes-db
    plan: free
